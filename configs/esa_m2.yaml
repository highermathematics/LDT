# LDT Configuration — ESA Mission 2
# 卫星遥测数据: 90 数值通道 (100原始-10类别型跳过), 18秒采样重采样为5分钟, 2000–2003

dataset:
  name: esa_m2
  prediction_length: 24
  lookback_window: 96

vae:
  latent_dim: 6        # m: √(90/2)≈6.7, f=90/6=15≥2m=12
  embed_dim: 64
  num_layers: 3
  num_heads: 4
  kl_weight: 1.0e-8
  lr: 0.0005
  epochs: 300
  early_stop_patience: 25

diffusion:
  diffusion_steps: 100
  beta_1: 0.0001
  beta_T: 0.1
  noise_schedule: sqrt
  embed_dim: 128
  num_layers: 3
  num_heads: 8
  p_uncond: 0.1
  self_cond_prob: 0.4
  guidance_strength: 3.0
  lr: 0.0005
  epochs: 300
  early_stop_patience: 20
  ddim_steps: 100
  eval_scale: 1.0

training:
  batch_size: 64
  num_workers: 4
  seed: 42
  device: cuda
  checkpoint_dir: checkpoints
  log_interval: 10
