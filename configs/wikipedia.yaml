# Wikipedia dataset configuration
dataset:
  name: wikipedia
  prediction_length: 24
  lookback_window: 96
  dimension: 2000

vae:
  latent_dim: 32       # √(d/2) = √(1000) ≈ 32, f = 2000/32 ≈ 63 ≈ 2m = 64
  embed_dim: 128

diffusion:
  diffusion_steps: 100
  embed_dim: 256
  guidance_strength: 2.0
