# LDT Default Configuration
# Values here apply to all datasets unless overridden.

dataset:
  name: solar
  prediction_length: 24
  lookback_window: 96  # 4 x prediction_length

vae:
  latent_dim: 8        # m: √(d/2), f = d/m ≈ 2m（论文降采样约束）
  embed_dim: 64
  num_layers: 3
  num_heads: 4
  kl_weight: 1.0e-8    # 论文: 1e-8
  lr: 0.001
  epochs: 100
  early_stop_patience: 25

diffusion:
  diffusion_steps: 100   # K in [50, 100, 200, 300]
  beta_1: 0.0001
  beta_T: 0.1
  noise_schedule: sqrt   # sqrt or linear
  embed_dim: 128         # d_model in [32, 64, 128, 256]
  num_layers: 3
  num_heads: 8
  p_uncond: 0.1
  self_cond_prob: 0.4    # 自条件触发概率 40%（论文正文：60% 设为 0）
  guidance_strength: 3.0
  lr: 0.001               # 论文: Adam lr=1e-3
  epochs: 300
  early_stop_patience: 20
  ddim_steps: 100
  eval_scale: 0.5        # 评估校准系数（时序偏差修正）

training:
  batch_size: 64
  num_workers: 4
  seed: 42
  device: cuda
  checkpoint_dir: checkpoints
  log_interval: 10
