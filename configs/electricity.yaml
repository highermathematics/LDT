# Electricity dataset configuration
dataset:
  name: electricity
  prediction_length: 24
  lookback_window: 96
  dimension: 370

vae:
  latent_dim: 14       # √(d/2) = √(185) ≈ 14, f = 370/14 ≈ 26 ≈ 2m = 28
  embed_dim: 128

diffusion:
  diffusion_steps: 100
  embed_dim: 256
  guidance_strength: 5.0   # 论文: deterministic 数据集用更大 w
